server:
  port: 8080

spring:
  application:
    name: reemplazos-acropolis

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reemplazos_db}
    username: ${SPRING_DATASOURCE_USERNAME:acropolis_user}
    password: ${SPRING_DATASOURCE_PASSWORD:Acr0p0l1s_S3cur3_2026!}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      continue-on-error: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:noreply@colegioacropolis.cl}
    password: ${SPRING_MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    date-format: yyyy-MM-dd
    time-zone: America/Santiago
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    cl.acropolis: INFO
    org.hibernate.SQL: WARN
