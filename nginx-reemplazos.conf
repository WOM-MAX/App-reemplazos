# ============================================
# Nginx Reverse Proxy - Reemplazos Acrópolis
# Copiar a: /etc/nginx/conf.d/reemplazos.conf
# ============================================

server {
    listen 80;
    server_name reemplazos.colegioacropolis.cl;

    # Redirección a HTTPS (descomentar cuando Certbot esté configurado)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8096;

        # Headers de forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Soporte WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Archivos estáticos con cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass http://127.0.0.1:8096;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

