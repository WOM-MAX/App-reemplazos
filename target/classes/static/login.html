<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión — Colegio Acrópolis</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f1729",
                        "accent-orange": "#f97316",
                        "background-light": "#f6f7f8",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(249, 115, 22, 0.6);
            }
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .login-bg {
            background: linear-gradient(135deg, #0f1729 0%, #1a2544 50%, #0f1729 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <!-- Decorative elements -->
    <div class="absolute top-20 left-20 w-72 h-72 bg-accent-orange/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md animate-in">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center h-16 w-16 bg-accent-orange rounded-2xl text-white font-black text-2xl mb-4 pulse-glow float">
                A
            </div>
            <h1 class="text-white text-2xl font-bold">Colegio Acrópolis</h1>
            <p class="text-slate-400 text-sm mt-1 uppercase tracking-[0.3em]">Sistema de Gestión</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8">
            <div class="mb-6">
                <h2 class="text-white text-lg font-bold">Iniciar Sesión</h2>
                <p class="text-slate-400 text-sm mt-1">Ingresa tus credenciales para acceder al sistema</p>
            </div>

            <!-- Error message -->
            <div id="error-msg"
                class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">error</span>
                <span>Usuario o contraseña incorrectos</span>
            </div>

            <!-- Logout message -->
            <div id="logout-msg"
                class="hidden mb-4 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400 text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">check_circle</span>
                <span>Sesión cerrada correctamente</span>
            </div>

            <form action="/api/auth/login" method="POST" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Usuario</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">person</span>
                        <input name="username" type="text" required autofocus
                            class="w-full h-12 pl-11 pr-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 text-sm focus:ring-2 focus:ring-accent-orange focus:border-transparent transition-all"
                            placeholder="Ingresa tu usuario" />
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Contraseña</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
                        <input name="password" type="password" required
                            class="w-full h-12 pl-11 pr-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 text-sm focus:ring-2 focus:ring-accent-orange focus:border-transparent transition-all"
                            placeholder="Ingresa tu contraseña" />
                    </div>
                </div>
                <button type="submit"
                    class="w-full h-12 bg-accent-orange text-white font-bold rounded-xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
                    <span class="material-symbols-outlined text-lg">login</span>
                    Acceder
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-600 text-xs mt-6">
            Reemplazos y Ausencias &copy; 2026 — Colegio Acrópolis
        </p>
    </div>

    <script>
        // Show error/logout messages based on URL params
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'true') {
            document.getElementById('error-msg').classList.remove('hidden');
        }
        if (params.get('logout') === 'true') {
            document.getElementById('logout-msg').classList.remove('hidden');
        }
    </script>
</body>

</html>
